<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Graphraum benchmark</title>
		<style>
			:root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #09090b; color: #fafafa; }
			* { box-sizing: border-box; }
			body { margin: 0; }
			main { display: grid; grid-template-rows: auto minmax(0, 1fr); height: 100vh; }
			header { align-items: center; display: flex; flex-wrap: wrap; gap: 0.75rem; padding: 1rem; }
			button { background: #27272a; border: 1px solid #3f3f46; border-radius: 0.4rem; color: inherit; cursor: pointer; padding: 0.5rem 0.75rem; }
			button:hover { background: #3f3f46; }
			#graph { min-height: 0; position: relative; }
			#metrics { color: #a1a1aa; margin-left: auto; }
		</style>
	</head>
	<body>
		<main>
			<header>
				<strong>Graphraum</strong>
				<button type="button" data-size="1000">1k / 3k</button>
				<button type="button" data-size="10000">10k / 30k</button>
				<button type="button" id="mode">Switch to 3D</button>
				<span id="metrics"></span>
			</header>
			<div id="graph"></div>
		</main>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
